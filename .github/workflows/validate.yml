name: Validate Plugin

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    # Migrated to the recreational-spreadsheeting MicroVM runner plane
    # (cdk-github-microvm-runners). Ephemeral ARM64 Lambda MicroVM, powerless
    # (no AWS creds — this job needs none). The `microvm` label routes the
    # queued job to the plane's webhook; `self-hosted` is the standard gate.
    runs-on: [self-hosted, microvm]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Validate marketplace and plugin manifests
        run: node scripts/validate-plugin.mjs

      - name: Check -dev plugins are in sync with canonical plugins
        run: node scripts/gen-dev-plugin.mjs --check

      - name: Require version bump when plugin content changes (PRs)
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags origin ${{ github.base_ref }}
          node scripts/check-version-bump.mjs origin/${{ github.base_ref }}
