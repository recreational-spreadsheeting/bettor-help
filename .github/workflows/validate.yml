name: Validate Plugin

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Validate marketplace and plugin manifests
        run: node scripts/validate-plugin.mjs

      - name: Check -dev plugins are in sync with canonical plugins
        run: node scripts/gen-dev-plugin.mjs --check
